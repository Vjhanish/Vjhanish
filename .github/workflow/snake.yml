name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"  # daily at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake (Dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake-dark.svg?palette=github-dark&color_snake=a855f7&color_dots=#0a0a0f,#1a0533,#2d0a54,#4c1d95,#6d28d9,#a855f7

      - name: Generate Snake (Light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake-light.svg?palette=github-light&color_snake=a855f7&color_dots=#f5f5f5,#e9d5ff,#d8b4fe,#c084fc,#a855f7

      - name: Commit Snake Assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/snake-dark.svg assets/snake-light.svg
          git diff --staged --quiet || git commit -m "chore: update contribution snake [skip ci]"
          git push
